name: Daily Dashboard Screenshot
on:
  schedule:
    # 06:00 UTC = 09:00 Helsinki verano (EEST, UTC+3)
    - cron: '0 6 * * 1-5'
  workflow_dispatch:
jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer and Slack API
        run: npm install puppeteer @slack/web-api

      - name: Take Screenshot and Send to Slack
        uses: actions/github-script@v7
        with:
          script: |
            const puppeteer = require('puppeteer');
            const { WebClient } = require('@slack/web-api');

            async function run() {
              console.log('Taking dashboard screenshot...');

              const browser = await puppeteer.launch({
                headless: 'new',
                args: ['--no-sandbox', '--disable-setuid-sandbox']
              });
              const page = await browser.newPage();
              await page.setViewport({ width: 1440, height: 900 });
              await page.goto('https://naistaxi-dashboard.vercel.app/', {
                waitUntil: 'networkidle2',
                timeout: 30000
              });

              // Wait 15 seconds for Slack data to fully load
              await new Promise(r => setTimeout(r, 15000));

              await page.screenshot({ path: 'screenshot.jpg', fullPage: false });
              await browser.close();

              const slack = new WebClient(process.env.SLACK_BOT_TOKEN);
              await slack.files.uploadV2({
                channel_id: 'C09G3CKNQ82',
                file: 'screenshot.jpg',
                filename: 'dashboard_hoy.jpg',
                initial_comment: '📊 Good morning! Here is the current status of the dashboard to start the day.'
              });

              console.log('Screenshot sent to Slack successfully.');
            }

            run().catch(err => {
              console.error('Error:', err);
              process.exit(1);
            });
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
