name: Daily Dashboard Screenshot
on:
  schedule:
    # 06:00 UTC = 09:00 Helsinki verano (EEST, UTC+3)
    # 07:00 UTC = 09:00 Helsinki invierno (EET, UTC+2)
    - cron: '0 6 * * *'
    - cron: '0 7 * * *'
  workflow_dispatch:
jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer and Slack API
        run: npm install puppeteer @slack/web-api

      - name: Take Screenshot and Send to Slack
        uses: actions/github-script@v7
        with:
          script: |
            const puppeteer = require('puppeteer');
            const { WebClient } = require('@slack/web-api');

            async function run() {
              // Si es un trigger automático (schedule), comprobamos que sean las 9am en Helsinki
              const isScheduled = context.eventName === 'schedule';
              if (isScheduled) {
                const now = new Date();
                const helsinkiHour = parseInt(new Intl.DateTimeFormat('fi', {
                  timeZone: 'Europe/Helsinki',
                  hour: 'numeric',
                  hour12: false
                }).format(now));
                if (helsinkiHour !== 9) {
                  console.log(`Son las ${helsinkiHour}h en Helsinki, no es hora de enviar. Saliendo.`);
                  return;
                }
              }

              console.log('Tomando pantallazo del dashboard...');

              const browser = await puppeteer.launch({
                headless: 'new',
                args: ['--no-sandbox', '--disable-setuid-sandbox']
              });
              const page = await browser.newPage();
              await page.setViewport({ width: 1440, height: 900 });
              await page.goto('https://naistaxi-dashboard.vercel.app/', {
                waitUntil: 'networkidle2',
                timeout: 30000
              });

              // Esperamos 15 segundos para que los datos de Slack carguen completamente
              await new Promise(r => setTimeout(r, 15000));

              await page.screenshot({ path: 'screenshot.jpg', fullPage: false });
              await browser.close();

              const slack = new WebClient(process.env.SLACK_BOT_TOKEN);
              await slack.files.uploadV2({
                channel_id: 'C09G3CKNQ82',
                file: 'screenshot.jpg',
                filename: 'dashboard_hoy.jpg',
                initial_comment: '📊 ¡Buenos días! Aquí está el estado actual del dashboard para arrancar la jornada.'
              });

              console.log('Pantallazo enviado a Slack correctamente.');
            }

            run().catch(err => {
              console.error('Error:', err);
              process.exit(1);
            });
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
