name: Archive Slack Bookings

on:
  schedule:
    # Runs every day at 05:00 UTC (08:00 Helsinki summer / 07:00 winter)
    # Deliberately before the 06:00 screenshot job so the dashboard shows fresh archived data
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run archive script
        run: node scripts/archive-bookings.js
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          CHANNEL_ID: C0APSN13G3T

      - name: Commit updated archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bookings.json data/bookings.js
          if git diff --staged --quiet; then
            echo "No changes to archive"
          else
            git commit -m "Archive bookings: $(date -u +'%Y-%m-%d')"
            git push
          fi
